services:
  backend:
    build:
      context: ./godmode-agent
      dockerfile: Dockerfile.backend
    ports:
      - "8002:8002"
    volumes:
      - ./godmode-agent:/app
      - ./godmode-agent/data:/app/data
      - ./godmode-agent/scripts:/app/scripts
    environment:
      - RAY_ENV=development
      - GROQ_API_KEY=${GROQ_API_KEY}
      - SARVAM_API_KEY=${SARVAM_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    command: >
      sh -c "pip install -r requirements.txt &&
             python -m uvicorn apps.api.server:app --host 0.0.0.0 --port 8002 --reload"

  frontend:
    build:
      context: ./godmode-agent/apps/web
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    volumes:
      - ./godmode-agent/apps/web:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8002
    command: >
      sh -c "npm install &&
             npm run preview -- --host 0.0.0.0 --port 3000"