services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-litellm-master-key}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./data/litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "2"]

  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data/chroma:/chroma/chroma

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage

  # ── Firecrawl Self-Host Stack (Optional) ─────────────────────────
  # Local web crawling — no API key required when USE_DB_AUTHENTICATION=false
  # Start with: docker compose --profile firecrawl up -d
  # Or use: scripts/start_firecrawl_selfhost.sh
  firecrawl-api:
    image: ghcr.io/mendableai/firecrawl:latest
    container_name: firecrawl-api
    profiles: ["firecrawl"]
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - HOST=0.0.0.0
      - USE_DB_AUTHENTICATION=false
      - REDIS_URL=redis://firecrawl-redis:6379
      - REDIS_RATE_LIMIT_URL=redis://firecrawl-redis:6379
      - PLAYWRIGHT_MICROSERVICE_URL=http://firecrawl-playwright:3000
      - NUM_WORKERS_PER_QUEUE=2
      - LOGGING_LEVEL=info
    depends_on:
      firecrawl-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  firecrawl-redis:
    image: redis:7-alpine
    container_name: firecrawl-redis
    profiles: ["firecrawl"]
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - firecrawl-redis-data:/data

  firecrawl-playwright:
    image: ghcr.io/mendableai/firecrawl-playwright:latest
    container_name: firecrawl-playwright
    profiles: ["firecrawl"]
    restart: unless-stopped
    environment:
      - PORT=3000

volumes:
  firecrawl-redis-data:
