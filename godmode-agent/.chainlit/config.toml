[project]
user_env = []
session_timeout = 3600
user_session_timeout = 1296000
cache = false
persist_user_env = false
mask_user_env = true
allow_origins = ["*"]

[features]
unsafe_allow_html = true
latex = true
user_message_markdown = true
user_message_autoscroll = true
assistant_message_autoscroll = true
auto_tag_thread = true
edit_message = true
allow_thread_sharing = false
favorites = true

[features.spontaneous_file_upload]
    enabled = true
    accept = ["*/*"]
    max_files = 20
    max_size_mb = 500

[features.audio]
    enabled = false

[features.mcp]
    enabled = false

[UI]
name = "RAY God Mode"
default_theme = "dark"
layout = "wide"
confirm_new_chat = true
cot = "hidden"
custom_css = "/public/theme.css"
alert_style = "classic"

[meta]
generated_by = "2.10.1"
